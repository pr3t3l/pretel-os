[pytest]
addopts = -m "not eval" --strict-markers -ra
testpaths = tests
asyncio_mode = auto
markers =
    eval: live LLM evaluation tests (cost real money, opt-in via `pytest -m eval`)
    slow: tests that hit OpenAI for real embeddings (~$0.0002 per test). Default `pytest` includes them; `pytest -m "not slow"` skips for fast iteration.
