[mypy]
mypy_path = src
strict = True

# Pre-existing Module 2/3 tech debt — tracked in tasks 16d4056e (lessons.py)
# and equivalent for db.py / journal.py. Silenced here so mypy --strict on
# new code (M0.X tools, M0.X tests, M4 router code, M4 router tests) reports
# only NEW issues.
[mypy-mcp_server.db]
ignore_errors = True

[mypy-mcp_server.journal]
ignore_errors = True

[mypy-mcp_server.tools.lessons]
ignore_errors = True

[mypy-mcp_server.tools.context]
ignore_errors = True

[mypy-mcp_server.tools.catalog]
ignore_errors = True

[mypy-mcp_server.auth]
ignore_errors = True

# Third-party libs without type stubs
[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-psycopg_pool.*]
ignore_missing_imports = True

[mypy-fastmcp.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True
